<div class="interest-section">
  <h3>{{ include.section_title }}</h3>
  
  <div class="interest-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;">
    {% for interest in include.interests_list %}
    <div class="interest-card" style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: start;">
      
      <div class="interest-icon-placeholder" style="font-size: 3rem; margin-bottom: 15px;">{{ interest.emoji }}</div>

      <div class="interest-content">
        <h4 style="margin: 0 0 10px 0;">{{ interest.title }}</h4>
        <p style="margin: 0; color: #666; font-size: 0.95rem;">{{ interest.desc }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<style>
  .interest-section {
    margin-bottom: 40px;
  }
  .interest-section h3 {
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
    margin-top: 0;
  }
</style>
